appId: com.staffmanagement.app
productName: 직원근무관리
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - node_modules/**/*
  - package.json

npmRebuild: true

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.business

dmg:
  background: build/dmg-background.png
  window:
    width: 540
    height: 380

publish:
  provider: github
  owner: gangd132
  repo: Staff-Management-Program
