appId: com.staffmanagement.app
productName: 직원근무관리
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - node_modules/**/*
  - package.json

npmRebuild: true

# Windows 빌드 설정
win:
  target:
    # portable: 설치 불필요, exe 하나로 실행 (USB 배포에 최적, macOS에서도 Wine 없이 빌드 가능)
    - target: portable
      arch:
        - x64
    # nsis: 설치 마법사형 인스톨러 (Windows에서만 빌드 권장)
    - target: nsis
      arch:
        - x64

# NSIS 설치 마법사 설정
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 직원근무관리
  installerLanguages:
    - ko

# macOS 빌드 설정
mac:
  target:
    - dmg
  category: public.app-category.business

publish:
  provider: github
  owner: gangd132
  repo: Staff-Management-Program
